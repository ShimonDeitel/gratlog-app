name: Gratlog
options:
  bundleIdPrefix: com.shimondeitel.gratlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Gratlog:
    type: application
    platform: iOS
    sources:
      - path: Gratlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gratlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Gratlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GratlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GratlogTests
      - path: Gratlog.storekit
    dependencies:
      - target: Gratlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gratlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GratlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GratlogUITests
    dependencies:
      - target: Gratlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gratlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Gratlog:
    build:
      targets:
        Gratlog: all
        GratlogTests: [test]
        GratlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Gratlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Gratlog.storekit
      targets:
        - GratlogTests
        - GratlogUITests
    archive:
      config: Release
