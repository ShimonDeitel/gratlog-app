<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gratitude - Thank-You Log</title>
<style>
  body { margin:0; background: #1a0f14; color: #f2f2f2; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display:flex; justify-content:center; }
  .wrap { max-width: 640px; padding: 64px 24px; text-align: center; }
  h1 { color: #c25e7c; font-size: 2.2rem; margin-bottom: 8px; }
  p { line-height: 1.6; color: #cfcfcf; text-align: left; }
  a { color: #c25e7c; }
  .cta { display:inline-block; margin-top: 24px; padding: 12px 28px; border-radius: 10px; background: #c25e7c; color: #111; text-decoration: none; font-weight: 600; }
  footer { margin-top: 48px; font-size: 0.85rem; color: #888; }
  .badge { display:inline-block; padding:6px 14px; border:1px solid #c25e7c; border-radius:999px; color:#c25e7c; margin-bottom:24px; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #c25e7c55 0%, #c25e7c00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
<div class="badge">Gratitude</div>
<h1 style="text-align:center">Gratitude</h1>
<p>Track which clients you've sent thank-you notes or gifts to, and when.</p>
<div style="text-align:center"><a class="cta" href="#">Download on the App Store</a></div>
<p style="margin-top:40px">Log thank-you sends with client and date. Upgrade to Pro for recurring anniversary reminders per client.</p>

<footer>Contact: <a href="mailto:s0533495227@gmail.com">s0533495227@gmail.com</a></footer>
</div>
</body>
</html>
